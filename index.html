<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Accurate 3D Trig Simulation</title>
    <style>
        body { margin: 0; background-color: #1a1a1a; overflow: hidden; font-family: sans-serif; }
        #info { position: absolute; top: 15px; width: 100%; text-align: center; color: white; pointer-events: none; font-size: 18px; letter-spacing: 1px;}
    </style>
</head>
<body>
    <div id="info">f(x) = Sin(x) [Yellow] &nbsp; | &nbsp; f(x) = Cos(x) [Blue]</div>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- 1. Setup ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        // ตั้งกล้องให้มองเฉียงๆ เหมือนในรูป
        camera.position.set(8, 5, 8);
        controls.target.set(3, -1, -1);
        controls.update();

        const R = 2; // รัศมีวงกลม

        // --- 2. วาดแกนอ้างอิงและวงกลม ---
        const materialWhite = new THREE.LineBasicMaterial({ color: 0xffffff });
        
        // วงกลมบนระนาบ YZ
        const circleGeom = new THREE.BufferGeometry();
        const circlePts = [];
        for(let i=0; i<=64; i++) {
            const th = (i/64) * Math.PI * 2;
            circlePts.push(new THREE.Vector3(0, R*Math.sin(th), R*Math.cos(th)));
        }
        circleGeom.setFromPoints(circlePts);
        scene.add(new THREE.Line(circleGeom, materialWhite));

        // แกนกากบาทในวงกลม
        const crossGeom = new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(0, -R*1.2, 0), new THREE.Vector3(0, R*1.2, 0),
            new THREE.Vector3(0, 0, -R*1.2), new THREE.Vector3(0, 0, R*1.2)
        ]);
        scene.add(new THREE.LineSegments(crossGeom, materialWhite));

        // แกน X สำหรับกราฟ Sine (แนวนอนบนกำแพง) และ Cosine (แนวนอนบนพื้น)
        const axisGeom = new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(0, 0, -R), new THREE.Vector3(12, 0, -R), // แกน Sine
            new THREE.Vector3(0, -R, 0), new THREE.Vector3(12, -R, 0)  // แกน Cosine
        ]);
        scene.add(new THREE.LineSegments(axisGeom, materialWhite));

        // --- 3. เตรียม Data สำหรับกราฟคลื่น ---
        const NUM_PTS = 150;
        const LENGTH = 10;
        const dx = LENGTH / NUM_PTS;

        // Geometries
        const sineWaveGeom = new THREE.BufferGeometry();
        const cosWaveGeom = new THREE.BufferGeometry();
        const sinePillarsGeom = new THREE.BufferGeometry();
        const cosPillarsGeom = new THREE.BufferGeometry();

        // Arrays สำหรับเก็บตำแหน่ง (X, Y, Z)
        const sinePts = new Float32Array(NUM_PTS * 3);
        const cosPts = new Float32Array(NUM_PTS * 3);
        const sinePillars = new Float32Array(NUM_PTS * 6); // 2 จุดต่อ 1 เส้น
        const cosPillars = new Float32Array(NUM_PTS * 6);

        // Attributes
        sineWaveGeom.setAttribute('position', new THREE.BufferAttribute(sinePts, 3));
        cosWaveGeom.setAttribute('position', new THREE.BufferAttribute(cosPts, 3));
        sinePillarsGeom.setAttribute('position', new THREE.BufferAttribute(sinePillars, 3));
        cosPillarsGeom.setAttribute('position', new THREE.BufferAttribute(cosPillars, 3));

        // Materials
        const matSine = new THREE.LineBasicMaterial({ color: 0xffd700 }); // เหลือง
        const matCos = new THREE.LineBasicMaterial({ color: 0x00bfff });  // ฟ้า

        // สร้าง Mesh
        scene.add(new THREE.Line(sineWaveGeom, matSine));
        scene.add(new THREE.Line(cosWaveGeom, matCos));
        scene.add(new THREE.LineSegments(sinePillarsGeom, matSine));
        scene.add(new THREE.LineSegments(cosPillarsGeom, matCos));

        // จุดที่วิ่งบนวงกลมและเส้นฉายภาพ
        const dot = new THREE.Mesh(new THREE.SphereGeometry(0.08), new THREE.MeshBasicMaterial({color: 0xffffff}));
        scene.add(dot);
        
        const projectionGeom = new THREE.BufferGeometry();
        const projectionMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 });
        const projectionLines = new THREE.LineSegments(projectionGeom, projectionMat);
        scene.add(projectionLines);

        // --- 4. Animation Loop ---
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.02; // ความเร็ว

            // คำนวณคลื่นทั้งหมด
            for (let i = 0; i < NUM_PTS; i++) {
                let x = i * dx;
                let t = time - x * 1.5; // ย้อนเวลาตามระยะ X เพื่อให้คลื่นไหลไปข้างหน้า
                let y = R * Math.sin(t);
                let z = R * Math.cos(t);
                
                // Sine (กำแพง Z = -R)
                sinePts[i*3] = x; sinePts[i*3+1] = y; sinePts[i*3+2] = -R;
                
                // ซี่กรง Sine (จากแกนไปหาคลื่น)
                sinePillars[i*6] = x; sinePillars[i*6+1] = 0; sinePillars[i*6+2] = -R;
                sinePillars[i*6+3] = x; sinePillars[i*6+4] = y; sinePillars[i*6+5] = -R;
                
                // Cosine (พื้น Y = -R)
                cosPts[i*3] = x; cosPts[i*3+1] = -R; cosPts[i*3+2] = z;
                
                // ซี่กรง Cosine (จากแกนไปหาคลื่น)
                cosPillars[i*6] = x; cosPillars[i*6+1] = -R; cosPillars[i*6+2] = 0;
                cosPillars[i*6+3] = x; cosPillars[i*6+4] = -R; cosPillars[i*6+5] = z;
            }

            // แจ้ง Three.js ว่าข้อมูลมีการอัปเดต
            sineWaveGeom.attributes.position.needsUpdate = true;
            cosWaveGeom.attributes.position.needsUpdate = true;
            sinePillarsGeom.attributes.position.needsUpdate = true;
            cosPillarsGeom.attributes.position.needsUpdate = true;

            // อัปเดตจุดบนวงกลม
            let current_y = R * Math.sin(time);
            let current_z = R * Math.cos(time);
            dot.position.set(0, current_y, current_z);

            // อัปเดตเส้นฉายภาพจากวงกลมไปหากราฟ
            projectionGeom.setFromPoints([
                new THREE.Vector3(0, current_y, current_z), new THREE.Vector3(0, current_y, -R), // เส้นโยงไป Sine
                new THREE.Vector3(0, current_y, current_z), new THREE.Vector3(0, -R, current_z)  // เส้นโยงไป Cosine
            ]);

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
